model:
  provider: deepseek
  name: deepseek-chat
  temperature: 0.0

api:
  base_url: "https://api.deepseek.com"
  # api_key: set in config.local.yaml (gitignored) or via environment variable
  # (DEEPSEEK_API_KEY / MATH_ASSISTANT_API_KEY / OPENAI_API_KEY)
  # Create config.local.yaml next to this file:
  #   api:
  #     api_key: "sk-xxx"

search:
  provider: duckduckgo

vision:
  provider: openai
  model: gpt-4o
  base_url: "https://api.openai.com/v1"
  # api_key: set in config.local.yaml or via environment variable
  # (same key resolution as the main api.api_key: DEEPSEEK_API_KEY / MATH_ASSISTANT_API_KEY / OPENAI_API_KEY)

python_executor:
  timeout_seconds: 30

agent:
  max_tool_calls: 20

output:
  image_dir: "./images"
  # Save mode: "session" (at exit), "turn" (each Q&A), "manual" (on :save command)
  save_mode: "session"
  save_dir: "./sessions"
  html_export: true     # also produce self-contained .html
  embed_images: true    # base64-encode images into HTML
